name: Build (guarded npm install)

on:
  workflow_dispatch: {}          # 你可以点按钮触发“打包”
  push:
    tags:
      - "v*"                     # 你打 v1.0.0 这种 tag 也会触发“打包”（可选）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 关键：以后你所有 npm install 都用这个 action
      - name: Guarded npm install
        uses: Cai-Seven/reference-security-defenses/.github/actions/npm-guard-install@main
        with:
          max_age_days: "14"
          registry_url: "https://registry.npmjs.org"

      - name: Show installed versions (from node_modules)
        shell: bash
        run: |
          set -e

          echo "=== Top-level deps (npm ls --depth=0) ==="
          npm ls --depth=0 || true

          echo ""
          echo "=== Versions from node_modules (direct read) ==="
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const deps = Object.assign({}, pkg.dependencies || {}, pkg.devDependencies || {});

          const names = Object.keys(deps).sort((a, b) => a.localeCompare(b));

          for (const name of names) {
            const p = path.join('node_modules', name, 'package.json');
            if (!fs.existsSync(p)) {
              console.log(`${name}: (not installed) (requested: ${deps[name]})`);
              continue;
            }
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            console.log(`${name}: ${j.version} (requested: ${deps[name]})`);
          }
          NODE

      # 下载审计日志（无论成功失败都可看）
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-guard-audit
          path: logs/npm-guard-audit.log
