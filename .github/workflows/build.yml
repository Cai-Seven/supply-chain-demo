name: Build (guarded npm install)

on:
  workflow_dispatch: {}          # 你可以点按钮触发“打包”
  push:
    tags:
      - "v*"                     # 你打 v1.0.0 这种 tag 也会触发“打包”（可选）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 关键：以后你所有 npm install 都用这个 action
      - name: Guarded npm install
        uses: Cai-Seven/reference-security-defenses/.github/actions/npm-guard-install@main
        with:
          max_age_days: "14"
          registry_url: "https://registry.npmjs.org"

      # 这里放你真正的打包命令（示例）
      - name: Build
        run: |
          echo "Put your real build command here"
          # npm run build

      # 下载审计日志（无论成功失败都可看）
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-guard-audit
          path: logs/npm-guard-audit.log
